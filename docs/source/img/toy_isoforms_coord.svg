<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2700 900"
     font-family="DejaVu Sans, Arial, sans-serif" font-size="42">

  <!-- frame -->
  <rect x="13" y="13" width="2674" height="873"
        fill="white" stroke="#222" stroke-width="3"/>

  <!-- top-axis tick marks -->
  <g stroke="#222" stroke-width="3" stroke-linecap="butt">
    <line x1="414"  y1="41" x2="414"  y2="86"/>
    <line x1="676"  y1="41" x2="676"  y2="86"/>
    <line x1="1120" y1="41" x2="1120" y2="86"/>
    <line x1="1351" y1="41" x2="1351" y2="86"/>
    <line x1="1789" y1="41" x2="1789" y2="86"/>
    <line x1="2007" y1="41" x2="2007" y2="86"/>
  </g>

  <!-- tick labels -->
  <g fill="#222" text-anchor="end">
    <text x="406"  y="76">80</text>
    <text x="668"  y="76">200</text>
    <text x="1112" y="76">400</text>
    <text x="1343" y="76">500</text>
    <text x="1781" y="76">700</text>
    <text x="1999" y="76">800</text>
  </g>

  <!-- row labels (a-h) -->
  <g fill="#222" text-anchor="middle" dominant-baseline="middle">
    <text x="195" y="165">a</text>
    <text x="195" y="260">b</text>
    <text x="195" y="355">c</text>
    <text x="195" y="450">d</text>
    <text x="195" y="544">e</text>
    <text x="195" y="639">f</text>
    <text x="195" y="734">g</text>
    <text x="195" y="829">h</text>
  </g>

  <!-- intron connector lines -->
  <g stroke="#222" stroke-width="3" stroke-linecap="butt">
    <!-- a -->
    <line x1="414"  y1="165" x2="1121" y2="165"/>
    <line x1="1349" y1="165" x2="2012" y2="165"/>
    <!-- b -->
    <line x1="414"  y1="260" x2="676"  y2="260"/>
    <line x1="793"  y1="260" x2="1233" y2="260"/>
    <line x1="1349" y1="260" x2="2012" y2="260"/>
    <!-- c -->
    <line x1="414"  y1="355" x2="1233" y2="355"/>
    <line x1="1349" y1="355" x2="2012" y2="355"/>
    <!-- d -->
    <line x1="414"  y1="450" x2="676"  y2="450"/>
    <line x1="1349" y1="450" x2="1678" y2="450"/>
    <!-- e -->
    <line x1="414"  y1="544" x2="1121" y2="544"/>
    <line x1="1349" y1="544" x2="1789" y2="544"/>
    <!-- f -->
    <line x1="414"  y1="639" x2="2012" y2="639"/>
    <!-- g -->
    <line x1="414"  y1="734" x2="676"  y2="734"/>
    <!-- h -->
    <line x1="414"  y1="829" x2="1789" y2="829"/>
  </g>

  <!-- exon rectangles -->
  <g fill="#79c1c4">
    <!-- a -->
    <rect x="231"  y="139" width="184" height="53"/>
    <rect x="1121" y="139" width="229" height="53"/>
    <rect x="2012" y="139" width="451" height="53"/>
    <!-- b -->
    <rect x="231"  y="234" width="184" height="53"/>
    <rect x="676"  y="234" width="118" height="53"/>
    <rect x="1233" y="234" width="117" height="53"/>
    <rect x="2012" y="234" width="451" height="53"/>
    <!-- c -->
    <rect x="231"  y="329" width="184" height="53"/>
    <rect x="1233" y="329" width="117" height="53"/>
    <rect x="2012" y="329" width="451" height="53"/>
    <!-- d -->
    <rect x="231"  y="424" width="184" height="53"/>
    <rect x="676"  y="424" width="674" height="53"/>
    <rect x="1678" y="424" width="228" height="53"/>
    <!-- e -->
    <rect x="231"  y="518" width="184" height="54"/>
    <rect x="1121" y="518" width="229" height="54"/>
    <rect x="1789" y="518" width="117" height="54"/>
    <!-- f -->
    <rect x="231"  y="613" width="184" height="54"/>
    <rect x="2012" y="613" width="451" height="54"/>
    <!-- g -->
    <rect x="231"  y="708" width="184" height="54"/>
    <rect x="676"  y="708" width="1230" height="54"/>
    <!-- h -->
    <rect x="231"  y="803" width="184" height="54"/>
    <rect x="1789" y="803" width="228" height="54"/>
